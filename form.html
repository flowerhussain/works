<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Admission Form - University Of ABC</title>
</head>
<body>
    <h1>Admission Form</h1>
    
    <form action="post">
        <label for="username">Enter Your Name</label>
        <div>
     <input type="text" id="username" name="Your Name" placeholder="Enter Your Name ">
     </div>
     <div>
     <input type="radio" id="male" name="gender" value="male">
     <label for="male">Male</label>
       <input type="radio" id="female" name="gender" value="female">
     <label for="female">Female</label>
     </div>
     <div>
        <input type="checkbox" id="qualification" name="qualification" value="yes">
        <label for="qualification">Intermedate Completed</label>
     </div>
     <div>
        <br
        <label for="comment">Why You Want To Apply For ABC</label>
        <textarea name="comment" id="comment" rows="10" cols="50"></textarea>
     </div>
     <div>
        
        <select name="Degrees">
        <option value="CS">BS CS</option>
        <option value="SE">SE</option>
        <option value=""></option>
     </div>
     

    
</body>
</html>
